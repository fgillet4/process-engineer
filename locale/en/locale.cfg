[technology-description]
pe-steam-reforming=Reform natural gas (methane) with steam to produce synthesis gas (H₂/CO).\nFoundation of industrial hydrogen and chemical production.
pe-hydrogen-production=Water-gas shift reaction + PSA purification to produce pure hydrogen from syngas.
pe-ammonia-synthesis=High-pressure Haber-Bosch loop for ammonia synthesis.\nN₂ + 3H₂ → 2NH₃ — basis of global fertilizer supply.
pe-steam-cracking=High-temperature thermal cracking of light alkanes.\nProduces ethylene — the most-produced organic chemical globally.
pe-methanol-chemistry=Catalytic synthesis of methanol from syngas.\nMethanol is a fuel, solvent, and C1 chemistry building block.
pe-fertilizer-chemistry=Urea synthesis from ammonia and CO₂.\nHighest-volume solid fertilizer; Haber-Bosch process feeds ~4 billion people.
