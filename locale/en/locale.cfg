[entity-description]
pe-smr=Endothermic catalytic reforming of methane with steam at 800–900 °C.\nCH₄ + H₂O → CO + 3H₂  (ΔH = +206 kJ/mol)\nNi/Al₂O₃ catalyst. Steam-to-carbon ratio 3:1 to suppress coke.
pe-wgs=Catalytic shift of CO with steam to produce H₂ and CO₂.\nCO + H₂O ⇌ CO₂ + H₂  (ΔH = −41 kJ/mol)\nHT stage: Fe₃O₄/Cr₂O₃ at 330–430 °C. LT stage: Cu/ZnO at 200–250 °C.
pe-haber-bosch=High-pressure ammonia synthesis loop.\nN₂ + 3H₂ ⇌ 2NH₃  (ΔH = −92 kJ/mol)\nPromoted iron catalyst, 400–500 °C, 150–300 bar. Recycle loop for >95% conversion.
pe-compressor=Multi-stage centrifugal compressor with intercooling.\nCompresses gases to ~200 bar for high-pressure synthesis loops.
pe-heat-exchanger=Counter-current shell-and-tube heat exchanger.\nHot and cold streams exchange heat without mixing. Recovers waste heat from exothermic reactors.
pe-flash-separator=Adiabatic flash drum. Vapour-liquid equilibrium separation.\nOpens thermodynamic status panel showing Rachford-Rice V/L split.
pe-cracker=Fired tubular steam cracker at 750–850 °C.\nC₂H₆ + steam → C₂H₄ + H₂  (ΔH = +137 kJ/mol)\nShort residence time (ms range); rapid quench essential to freeze product distribution.
pe-methanol-reactor=Methanol synthesis reactor.\nCO + 2H₂ → CH₃OH  (ΔH = −91 kJ/mol)\nCu/ZnO/Al₂O₃ catalyst, 250 °C, 50–100 bar. Requires cooling (exothermic).
pe-psa-splitter=Pressure Swing Adsorption — separates H₂ from CO/CO₂ in syngas.\nH₂ purity ~99.9%, CO recovery ~85%. Models PSA or membrane separation.

